{% extends "base.html" %}
{% block title %}Všechny knihy{% endblock title %}
{% block content %}
<h1>Všechny knihy</h1>

    {% for book in books %}
    <ul>
        <li>
            Název: {{book.name}} Cena: {{book.price}}
            <a href="{% url "edit_book" book.id %}">Editovat</a>  
            <a href="{% url "delete_book" book.id %}" onclick="return confirm('Opravdu chcete smazat tuto knihu?')">Smazat</a>
        </li>
    </ul>
    {% endfor %}
    <a href="{% url "homepage" %}">Návrat zpět na hlavní stránku</a>
{% endblock content %}
