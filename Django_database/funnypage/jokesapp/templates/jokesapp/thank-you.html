{% load static %}
<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✅ Děkujeme!</title>
    <link rel="stylesheet" href="{% static "jokesapp/styles.css" %}">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✅</text></svg>">
</head>
<body>
    <!-- Navigace -->
    <nav class="navbar">
        <a href="{% url "home_page" %}" class="navbar-brand">😂 Vtipy</a>
        <ul class="navbar-nav">
            <li><a href="{% url "home_page" %}">Domů</a></li>
            <li><a href="{% url "all_jokes_page" %}">Všechny vtipy</a></li>
        </ul>
    </nav>

    <!-- Hlavní obsah -->
    <main class="main-container">
        <section class="thank-you-container">
            <!-- Success ikona -->
            <div class="success-icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            
            <!-- Text -->
            <h1 class="thank-you-title">Děkujeme! 🎉</h1>
            <p class="thank-you-text">Tvůj vtip byl úspěšně přidán. Díky, že přispíváš k dobré náladě!</p>
            
            <!-- Odkazy -->
            <div class="thank-you-links">
                <a href="{% url "all_jokes_page" %}" class="btn-primary">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="20" height="20">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    Zobrazit všechny vtipy
                </a>
                <a href="{% url "home_page" %}" class="btn-secondary">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="20" height="20">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
                    </svg>
                    Přidat další vtip
                </a>
            </div>
        </section>
    </main>
</body>
</html>
